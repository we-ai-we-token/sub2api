name: Production Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to deploy the release branch'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy production image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Validate confirmation
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "Production deploy was not run because confirm was not DEPLOY." >&2
            exit 1
          fi

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: release

      - name: Validate required secrets
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          for name in PROD_HOST PROD_SSH_USER PROD_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Prepare SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${PROD_SSH_KEY}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          known_hosts_tmp="$(mktemp)"
          trap 'rm -f "${known_hosts_tmp}"' EXIT
          for attempt in 1 2 3; do
            : > "${known_hosts_tmp}"
            ssh-keyscan -T 10 -t rsa,ecdsa,ed25519 -H "${PROD_HOST}" > "${known_hosts_tmp}" || true
            if [ -s "${known_hosts_tmp}" ]; then
              cat "${known_hosts_tmp}" >> ~/.ssh/known_hosts
              break
            fi
            echo "ssh-keyscan did not return host keys for ${PROD_HOST} on attempt ${attempt}/3" >&2
            sleep 3
          done
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "ssh-keyscan did not collect any host keys for PROD_HOST." >&2
            exit 1
          fi

      - name: Upload production deployment files
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
        run: |
          set -euo pipefail
          tar czf /tmp/sub2api-production-deploy.tgz -C deploy production
          ssh -i ~/.ssh/prod_key "${PROD_SSH_USER}@${PROD_HOST}" 'cat > /tmp/sub2api-production-deploy.tgz' < /tmp/sub2api-production-deploy.tgz
          ssh -i ~/.ssh/prod_key "${PROD_SSH_USER}@${PROD_HOST}" 'rm -rf /tmp/sub2api-production && mkdir -p /tmp/sub2api-production && tar xzf /tmp/sub2api-production-deploy.tgz -C /tmp/sub2api-production && sudo install -m 0644 /tmp/sub2api-production/production/docker-compose.yml /opt/sub2api/compose/docker-compose.yml && sudo install -m 0644 /tmp/sub2api-production/production/Caddyfile /opt/sub2api/compose/Caddyfile && sudo install -m 0755 /tmp/sub2api-production/production/scripts/deploy-app.sh /opt/sub2api/compose/scripts/deploy-app.sh && sudo install -m 0755 /tmp/sub2api-production/production/scripts/healthcheck.sh /opt/sub2api/compose/scripts/healthcheck.sh'

      - name: Build Docker image
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          docker build -f deploy/Dockerfile -t "sub2api:${SHA}" .
          docker save "sub2api:${SHA}" | gzip -9 > "sub2api-${SHA}.tar.gz"

      - name: Upload image archive
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          ssh -i ~/.ssh/prod_key "${PROD_SSH_USER}@${PROD_HOST}" 'sudo install -d -m 0755 /opt/sub2api/releases/images && sudo chown "$USER":"$USER" /opt/sub2api/releases/images'
          ssh -i ~/.ssh/prod_key "${PROD_SSH_USER}@${PROD_HOST}" "cat > /opt/sub2api/releases/images/sub2api-${SHA}.tar.gz" < "sub2api-${SHA}.tar.gz"

      - name: Deploy image on production server
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          ssh -i ~/.ssh/prod_key "${PROD_SSH_USER}@${PROD_HOST}" "sudo /opt/sub2api/compose/scripts/deploy-app.sh ${SHA}"

      - name: Run healthcheck
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/prod_key "${PROD_SSH_USER}@${PROD_HOST}" 'sudo /opt/sub2api/compose/scripts/healthcheck.sh'
